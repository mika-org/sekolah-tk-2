<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 300" width="100%" height="100%">
  <defs>
    <linearGradient id="roofGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#057a44"/>
      <stop offset="100%" stop-color="#034d2b"/>
    </linearGradient>

    <linearGradient id="wallGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef08a"/>
      <stop offset="100%" stop-color="#facc15"/>
    </linearGradient>

    <linearGradient id="grassGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>

    <linearGradient id="doorGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b45309"/>
      <stop offset="100%" stop-color="#78350f"/>
    </linearGradient>

    <filter id="buildingShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#000" flood-opacity="0.12"/>
    </filter>
  </defs>

  <g filter="url(#buildingShadow)">
    <!-- Grass Patch Base -->
    <ellipse cx="175" cy="265" rx="155" ry="25" fill="url(#grassGrad)"/>
    <ellipse cx="175" cy="260" rx="140" ry="18" fill="#86efac" opacity="0.4"/>

    <!-- School Building Main Body -->
    <rect x="75" y="130" width="200" height="120" rx="12" fill="url(#wallGrad)" stroke="#eab308" stroke-width="2"/>

    <!-- Brick Texture Lines -->
    <line x1="75" y1="170" x2="275" y2="170" stroke="#ca8a04" stroke-width="1.5" opacity="0.3"/>
    <line x1="75" y1="210" x2="275" y2="210" stroke="#ca8a04" stroke-width="1.5" opacity="0.3"/>

    <!-- Roof Main Triangle Base -->
    <path d="M 50,140 L 175,60 L 300,140 Z" fill="url(#roofGrad)" stroke="#022c22" stroke-width="2"/>
    <!-- Roof Overhang Trim -->
    <path d="M 45,142 Q 175,55 305,142" stroke="#4ade80" stroke-width="4" stroke-linecap="round" fill="none"/>

    <!-- Clock Tower / Belfry Top -->
    <rect x="145" y="40" width="60" height="40" rx="6" fill="#fef08a" stroke="#eab308" stroke-width="2"/>
    <path d="M 135,42 L 175,10 L 215,42 Z" fill="url(#roofGrad)"/>

    <!-- Golden Flag on Top -->
    <line x1="175" y1="10" x2="175" y2="-10" stroke="#b45309" stroke-width="2.5" stroke-linecap="round"/>
    <polygon points="175,-10 205,-3 175,4" fill="#f59e0b"/>

    <!-- Clock Face -->
    <circle cx="175" cy="60" r="14" fill="#ffffff" stroke="#057a44" stroke-width="2"/>
    <!-- Clock Hands (10:10) -->
    <line x1="175" y1="60" x2="169" y2="52" stroke="#0f172a" stroke-width="2" stroke-linecap="round"/>
    <line x1="175" y1="60" x2="183" y2="54" stroke="#0f172a" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="175" cy="60" r="2" fill="#057a44"/>

    <!-- Arch Door -->
    <path d="M 148,250 L 148,195 Q 175,175 202,195 L 202,250 Z" fill="url(#doorGrad)" stroke="#451a03" stroke-width="2"/>
    <!-- Door Knob -->
    <circle cx="193" cy="222" r="3" fill="#fbbf24"/>

    <!-- Windows Left & Right -->
    <!-- Left Window -->
    <rect x="95" y="155" width="36" height="42" rx="18" fill="#e0f2fe" stroke="#0284c7" stroke-width="2.5"/>
    <line x1="113" y1="155" x2="113" y2="197" stroke="#0284c7" stroke-width="2"/>
    <line x1="95" y1="176" x2="131" y2="176" stroke="#0284c7" stroke-width="2"/>

    <!-- Right Window -->
    <rect x="219" y="155" width="36" height="42" rx="18" fill="#e0f2fe" stroke="#0284c7" stroke-width="2.5"/>
    <line x1="237" y1="155" x2="237" y2="197" stroke="#0284c7" stroke-width="2"/>
    <line x1="219" y1="176" x2="255" y2="176" stroke="#0284c7" stroke-width="2"/>

    <!-- Front Entrance Steps -->
    <path d="M 135,250 L 215,250 L 225,262 L 125,262 Z" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5"/>

    <!-- Cute Sun & Cloud Accents -->
    <circle cx="40" cy="35" r="16" fill="#facc15" opacity="0.9"/>
    <path d="M 280,30 Q 290,20 305,25 Q 320,20 325,32 Q 335,35 330,45 Q 315,50 280,45 Z" fill="#ffffff" opacity="0.85"/>
  </g>
</svg>
