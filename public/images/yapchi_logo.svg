<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <linearGradient id="yapchiGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#facc15"/>
      <stop offset="100%" stop-color="#ca8a04"/>
    </linearGradient>

    <linearGradient id="yapchiRed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#991b1b"/>
    </linearGradient>

    <filter id="yapchiShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <g filter="url(#yapchiShadow)">
    <!-- Shield Outer Frame -->
    <path d="M 100,18 C 150,18 175,30 175,85 C 175,140 100,182 100,182 C 100,182 25,140 25,85 C 25,30 50,18 100,18 Z" fill="url(#yapchiGold)" stroke="#854d0e" stroke-width="2"/>

    <!-- Inner Shield Body -->
    <path d="M 100,26 C 142,26 163,36 163,85 C 163,132 100,168 100,168 C 100,168 37,132 37,85 C 37,36 58,26 100,26 Z" fill="#ffffff" stroke="#eab308" stroke-width="1.5"/>

    <!-- Education Torch Graphic -->
    <g transform="translate(100, 75)">
      <!-- Flame -->
      <path d="M 0,-40 Q 15,-20 5,-5 Q 25,-15 15,10 Q 0,25 -15,10 Q -25,-15 -5,-5 Q -15,-20 0,-40 Z" fill="url(#yapchiRed)"/>
      <path d="M 0,-25 Q 8,-12 3,-3 Q 12,-9 8,5 Q 0,14 -8,5 Q -12,-9 -3,-3 Q -8,-12 0,-25 Z" fill="#facc15"/>
      <!-- Torch Handle -->
      <path d="M -8,15 L 8,15 L 4,45 L -4,45 Z" fill="#78350f"/>
      <rect x="-10" y="12" width="20" height="6" rx="2" fill="#d97706"/>
    </g>

    <!-- Red Ribbon Banner -->
    <path d="M 20,138 L 180,138 L 170,165 L 30,165 Z" fill="url(#yapchiRed)" stroke="#7f1d1d" stroke-width="1.5"/>
    <polygon points="10,148 30,138 30,165 10,155 20,150" fill="#450a0a"/>
    <polygon points="190,148 170,138 170,165 190,155 180,150" fill="#450a0a"/>

    <!-- Ribbon Text YAPCHI -->
    <text x="100" y="157" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-weight="900" font-size="14" fill="#ffffff" text-anchor="middle" letter-spacing="2">
      YAPCHI
    </text>
  </g>
</svg>
