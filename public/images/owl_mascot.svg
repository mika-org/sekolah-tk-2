<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <!-- Soft gradients -->
    <radialGradient id="owlBodyGrad" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="60%" stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </radialGradient>

    <radialGradient id="owlBellyGrad" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </radialGradient>

    <linearGradient id="beakGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>

    <linearGradient id="capGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>

    <linearGradient id="bookGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="50%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>

    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000" flood-opacity="0.15"/>
    </filter>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#softShadow)">
    <!-- Shadow under Owl -->
    <ellipse cx="200" cy="365" rx="110" ry="18" fill="#000000" opacity="0.12"/>

    <!-- Tail feathers -->
    <path d="M 160,320 C 150,350 250,350 240,320 Z" fill="#4c1d95"/>

    <!-- Main Owl Body -->
    <ellipse cx="200" cy="220" rx="115" ry="125" fill="url(#owlBodyGrad)"/>

    <!-- Ears / Tufts -->
    <path d="M 110,130 Q 90,60 135,105 Z" fill="#5b21b6"/>
    <path d="M 290,130 Q 310,60 265,105 Z" fill="#5b21b6"/>

    <!-- Belly Oval -->
    <ellipse cx="200" cy="245" rx="75" ry="85" fill="url(#owlBellyGrad)"/>

    <!-- Belly Feather Markings -->
    <path d="M 180,210 Q 200,225 220,210 M 170,240 Q 200,260 230,240 M 180,270 Q 200,285 220,270" stroke="#f59e0b" stroke-width="3.5" stroke-linecap="round" fill="none" opacity="0.7"/>

    <!-- Large Eyes Outer Circle -->
    <circle cx="150" cy="155" r="42" fill="#ffffff" stroke="#e2e8f0" stroke-width="3"/>
    <circle cx="250" cy="155" r="42" fill="#ffffff" stroke="#e2e8f0" stroke-width="3"/>

    <!-- Eye Iris (Sparkling Blue/Amber) -->
    <circle cx="155" cy="155" r="25" fill="#1d4ed8"/>
    <circle cx="245" cy="155" r="25" fill="#1d4ed8"/>

    <!-- Eye Pupils -->
    <circle cx="157" cy="155" r="14" fill="#0f172a"/>
    <circle cx="243" cy="155" r="14" fill="#0f172a"/>

    <!-- Eye Catchlights (Shiny highlights) -->
    <circle cx="152" cy="148" r="6" fill="#ffffff"/>
    <circle cx="163" cy="160" r="2.5" fill="#ffffff"/>
    <circle cx="238" cy="148" r="6" fill="#ffffff"/>
    <circle cx="249" cy="160" r="2.5" fill="#ffffff"/>

    <!-- Cute Beak -->
    <path d="M 188,172 Q 200,170 212,172 L 200,202 Z" fill="url(#beakGrad)" stroke="#b45309" stroke-width="1.5"/>

    <!-- Cheeks (Blush) -->
    <ellipse cx="118" cy="182" rx="14" ry="9" fill="#f43f5e" opacity="0.35"/>
    <ellipse cx="282" cy="182" rx="14" ry="9" fill="#f43f5e" opacity="0.35"/>

    <!-- Wings (Left & Right) -->
    <path d="M 90,200 Q 55,250 100,290 Q 125,260 115,220 Z" fill="#6d28d9"/>
    <path d="M 310,200 Q 345,250 300,290 Q 275,260 285,220 Z" fill="#6d28d9"/>

    <!-- Feet / Talons -->
    <path d="M 160,335 Q 170,355 180,335 M 170,335 L 170,355" stroke="#d97706" stroke-width="7" stroke-linecap="round" fill="none"/>
    <path d="M 220,335 Q 230,355 240,335 M 230,335 L 230,355" stroke="#d97706" stroke-width="7" stroke-linecap="round" fill="none"/>

    <!-- Open Book in Front -->
    <g transform="translate(115, 260)">
      <!-- Left Page -->
      <path d="M 85,15 Q 45,5 5,20 L 5,75 Q 45,60 85,70 Z" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
      <!-- Right Page -->
      <path d="M 85,15 Q 125,5 165,20 L 165,75 Q 125,60 85,70 Z" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
      <!-- Spine / Cover -->
      <path d="M 5,20 Q 45,5 85,15 Q 125,5 165,20 L 165,24 Q 125,9 85,19 Q 45,9 5,24 Z" fill="url(#bookGrad)"/>
      <!-- Text Lines -->
      <line x1="20" y1="35" x2="70" y2="30" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="20" y1="48" x2="65" y2="44" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="100" y1="30" x2="150" y2="35" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="100" y1="44" x2="145" y2="48" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
      <!-- Ribbon Bookmark -->
      <path d="M 85,15 L 85,82 L 92,75 L 99,82 L 99,15 Z" fill="#ef4444"/>
    </g>

    <!-- Graduation Mortarboard Cap -->
    <g transform="translate(0, 5)">
      <!-- Cap Base -->
      <ellipse cx="200" cy="92" rx="42" ry="14" fill="#0f172a"/>
      <!-- Diamond Board -->
      <polygon points="200,45 315,82 200,118 85,82" fill="url(#capGrad)" stroke="#334155" stroke-width="2.5"/>
      <!-- Top Button -->
      <ellipse cx="200" cy="81" rx="7" ry="4" fill="#fbbf24"/>
      <!-- Tassel Thread -->
      <path d="M 200,81 Q 250,85 262,125" fill="none" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <!-- Tassel Fringe -->
      <polygon points="258,125 266,125 268,145 256,145" fill="#f59e0b"/>
    </g>
  </g>
</svg>
