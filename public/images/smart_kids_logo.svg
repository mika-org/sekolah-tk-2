<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <linearGradient id="ringGradRed" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>

    <linearGradient id="ringGradYellow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#facc15"/>
      <stop offset="100%" stop-color="#eab308"/>
    </linearGradient>

    <linearGradient id="ribbonGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#057a44"/>
      <stop offset="100%" stop-color="#034d2b"/>
    </linearGradient>

    <filter id="logoShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <g filter="url(#logoShadow)">
    <!-- Outer Red Circular Border -->
    <circle cx="100" cy="92" r="82" fill="url(#ringGradRed)"/>

    <!-- Inner Yellow Ring -->
    <circle cx="100" cy="92" r="72" fill="url(#ringGradYellow)"/>

    <!-- Center White Disc -->
    <circle cx="100" cy="92" r="60" fill="#ffffff" stroke="#f59e0b" stroke-width="2"/>

    <!-- Mini Owl Mascot inside Logo -->
    <g transform="translate(100, 90) scale(0.38)">
      <!-- Owl Body -->
      <ellipse cx="0" cy="10" rx="60" ry="65" fill="#7c3aed"/>
      <!-- Belly -->
      <ellipse cx="0" cy="22" rx="40" ry="45" fill="#fef08a"/>
      <!-- Eyes -->
      <circle cx="-24" cy="-22" r="22" fill="#ffffff"/>
      <circle cx="24" cy="-22" r="22" fill="#ffffff"/>
      <circle cx="-22" cy="-22" r="12" fill="#1d4ed8"/>
      <circle cx="22" cy="-22" r="12" fill="#1d4ed8"/>
      <circle cx="-20" cy="-25" r="4" fill="#ffffff"/>
      <circle cx="24" cy="-25" r="4" fill="#ffffff"/>
      <!-- Beak -->
      <polygon points="-8,-8 8,-8 0,10" fill="#f59e0b"/>
      <!-- Cap -->
      <polygon points="0,-75 60,-55 0,-35 -60,-55" fill="#0f172a"/>
      <ellipse cx="0" cy="-35" rx="22" ry="7" fill="#1e293b"/>
      <circle cx="0" cy="-55" r="4" fill="#fbbf24"/>
      <path d="M 0,-55 Q 30,-50 35,-30" fill="none" stroke="#fbbf24" stroke-width="3"/>
    </g>

    <!-- Green Ribbon Banner at Bottom -->
    <!-- Ribbon Left Fold -->
    <polygon points="15,162 45,152 45,178 15,172 28,167" fill="#022c22"/>
    <!-- Ribbon Right Fold -->
    <polygon points="185,162 155,152 155,178 185,172 172,167" fill="#022c22"/>

    <!-- Ribbon Main Body -->
    <path d="M 32,150 L 168,150 L 178,175 L 22,175 Z" fill="url(#ribbonGrad)" stroke="#14532d" stroke-width="1.5"/>

    <!-- Ribbon Text -->
    <text x="100" y="167" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-weight="900" font-size="12" fill="#ffffff" text-anchor="middle" letter-spacing="1">
      SMART KIDS
    </text>
  </g>
</svg>
